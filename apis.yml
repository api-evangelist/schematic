apis:
  - aid: schematic:schematic-api
    name: Schematic API
    description: >-
      The Schematic REST API enables programmatic management of features, flags,
      plans, companies, users, entitlements, billing credits, and webhooks.
      Authentication uses API keys sent in the X-Schematic-Api-Key header.
      Supports production, staging, and development environments with
      environment-scoped API keys (sch_prod, sch_stag, sch_dev prefixes).
