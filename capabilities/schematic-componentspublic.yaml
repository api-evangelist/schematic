naftiko: 1.0.0-alpha2
info:
  label: Schematic API — componentspublic
  description: 'Schematic API — componentspublic. 1 operations. Lead operation: Get public plans. Self-contained Naftiko capability
    covering one Schematic business surface.'
  tags:
  - Schematic
  - componentspublic
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    SCHEMATIC_API_KEY: SCHEMATIC_API_KEY
capability:
  consumes:
  - type: http
    namespace: schematic-componentspublic
    baseUri: https://api.schematichq.com
    description: Schematic API — componentspublic business capability. Self-contained, no shared references.
    resources:
    - name: public-plans
      path: /public/plans
      operations:
      - name: getpublicplans
        method: GET
        description: Get public plans
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: apikey
      key: X-Schematic-Api-Key
      value: '{{env.SCHEMATIC_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: schematic-componentspublic-rest
    port: 8080
    description: REST adapter for Schematic API — componentspublic. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/public/plans
      name: public-plans
      description: REST surface for public-plans.
      operations:
      - method: GET
        name: getpublicplans
        description: Get public plans
        call: schematic-componentspublic.getpublicplans
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: schematic-componentspublic-mcp
    port: 9090
    transport: http
    description: MCP adapter for Schematic API — componentspublic. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: get-public-plans
      description: Get public plans
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: schematic-componentspublic.getpublicplans
      outputParameters:
      - type: object
        mapping: $.
